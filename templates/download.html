<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galmee - MP3 Downloader | Free Audio Download</title>
    <meta name="description" content="Download MP3 audio from YouTube, Facebook & Instagram for free. Fast and easy audio downloader.">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ArdiMobile/FbDownApp/main/images/Galmee%20icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700;1,800;1,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root{--primary:#009959;--primary-dark:#007a47;--primary-light:#e6f5ee;--gold:#FEC601;--dark:#002611;--white:#FFFFFF;--text:#002611;--text-secondary:#4a6b56;--border:#d4e6da;--shadow:0 2px 4px rgba(0,38,17,0.06);--shadow-md:0 4px 16px rgba(0,38,17,0.1);--shadow-lg:0 8px 32px rgba(0,38,17,0.15);--radius:14px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:#f5f8f6;color:var(--text);line-height:1.6;min-height:100vh}
        .header{background:var(--dark);position:sticky;top:0;z-index:1000;box-shadow:0 2px 20px rgba(0,38,17,0.3)}
        .header-inner{max-width:1200px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
        .logo{display:flex;align-items:center;gap:3px;text-decoration:none}
        .logo-icon{width:26px;height:26px;border-radius:8px}
        .logo-text{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--gold) 0%,#ffe680 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .main{max-width:800px;margin:0 auto;padding:40px 16px}
        .logo-dot{color:red;font-size:10px}
        .download-card{background:#fff;border-radius:var(--radius);padding:30px;box-shadow:var(--shadow-lg);text-align:center}
        
        .video-info{margin:20px 0}
        .video-info img{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:15px}
        .video-info h2{font-size:20px;margin-bottom:10px;color:var(--dark)}
        .video-info p{color:var(--text-secondary);font-size:14px}
        
        .download-btn{width:100%;padding:18px;background:var(--primary);color:#fff;border:none;border-radius:50px;font-size:18px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.3s ease;margin-top:20px}
        .download-btn:hover{background:var(--gold);color:var(--dark);transform:translateY(-2px);box-shadow:0 8px 25px rgba(254,198,1,0.4)}
        .download-btn:disabled{opacity:0.6;cursor:not-allowed}
        
        .footer{background:var(--dark);padding:24px 16px;text-align:center;margin-top:40px;color:rgba(255,255,255,0.7)}
        .footer a{color:var(--gold);text-decoration:none}
        
        .loading{text-align:center;padding:40px}
        .loading i{font-size:40px;color:var(--primary)}
        
        .error{background:#fff;padding:30px;border-radius:var(--radius);text-align:center}
        .error i{font-size:40px;color:#e74c3c;margin-bottom:10px}
        
        .success-animation{animation:pop 0.5s ease}
        @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
        
        @media(max-width:480px){
            .download-card{padding:20px}
            .download-btn{font-size:16px;padding:15px}
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <img src="https://raw.githubusercontent.com/ArdiMobile/FbDownApp/main/images/Galmee%20icon.png" alt="Galmee" class="logo-icon">
                <span class="logo-text">Galmee</span>
                 <span class="logo-dot"><i class="fab fa-youtube"></i></span>
            </a>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main">
        <div id="content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p style="margin-top:15px;">Loading audio information...</p>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>2026 &copy; Galmee Inc | Developed by <a href="https://fb.com/yasingelma"><strong>Yasin Gelma</strong></a></p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get("url");

        if (!url) {
            document.getElementById("content").innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>No URL Provided</h2>
                    <p style="margin:10px 0;">Please paste a video link on the home page</p>
                    <a href="/" style="display:inline-block;padding:12px 30px;background:var(--primary);color:#fff;border-radius:50px;text-decoration:none;margin-top:10px;font-weight:600;">
                        <i class="fas fa-home"></i> Go Home
                    </a>
                </div>
            `;
        } else {
            fetchAudioInfo();
        }

        async function fetchAudioInfo() {
            try {
                const res = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if (data.status !== "success") {
                    showError(data.message || "Failed to load audio information");
                    return;
                }

                displayAudioInfo(data);
            } catch (err) {
                showError("Connection error. Please try again.");
            }
        }

        function formatDuration(seconds) {
            if (!seconds) return '';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function displayAudioInfo(data) {
            let platformIcon = '';
            if (url.includes('youtube') || url.includes('youtu.be')) {
                platformIcon = '<i class="fab fa-youtube" style="color:#FF0000;"></i> YouTube';
            } else if (url.includes('facebook')) {
                platformIcon = '<i class="fab fa-facebook" style="color:#1877f2;"></i> Facebook';
            } else if (url.includes('instagram')) {
                platformIcon = '<i class="fab fa-instagram" style="color:#E4405F;"></i> Instagram';
            }

            document.getElementById("content").innerHTML = `
                <div class="download-card">
                    ${data.thumbnail ? `
                        <div class="video-info">
                            <img src="${data.thumbnail}" alt="${data.title}">
                        </div>
                    ` : ''}
                    
                    <div class="video-info">
                        <h2>${data.title || 'Audio Track'}</h2>
                        <p>
                            ${data.uploader ? `<i class="fas fa-user"></i> ${data.uploader} • ` : ''}
                            ${data.duration ? `<i class="fas fa-clock"></i> ${formatDuration(data.duration)} • ` : ''}
                            ${platformIcon}
                        </p>
                    </div>
                    
                    <button onclick="downloadMP3('${url}')" id="downloadBtn" class="download-btn">
                        <i class="fas fa-music"></i> Download MP3
                    </button>
                    
                    <p style="margin-top:15px;font-size:12px;color:var(--text-secondary);">
                        <i class="fas fa-check-circle" style="color:var(--primary);"></i> 
                        High Quality 192kbps MP3 • Fast Download
                    </p>
                    
                    <div id="status" style="margin-top:10px;"></div>
                </div>
            `;
        }

        async function downloadMP3(videoUrl) {
            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Converting to MP3...';
            
            status.innerHTML = `
                <div style="padding:15px;background:var(--primary-light);border-radius:10px;margin-top:10px;">
                    <p style="color:var(--primary);font-size:14px;">
                        <i class="fas fa-info-circle"></i> Downloading and converting... This may take a moment.
                    </p>
                </div>
            `;
            
            try {
                const response = await fetch(`/api/download?url=${encodeURIComponent(videoUrl)}`);
                const data = await response.json();
                
                if (data.status === 'success' && data.file_path) {
                    // Trigger download
                    window.location.href = `/api/serve-file?path=${encodeURIComponent(data.file_path)}`;
                    
                    // Success message
                    status.innerHTML = `
                        <div style="padding:15px;background:#e6f5ee;border-radius:10px;margin-top:10px;" class="success-animation">
                            <p style="color:var(--primary);font-size:14px;font-weight:600;">
                                <i class="fas fa-check-circle"></i> Download Started! 🎵
                            </p>
                            <p style="font-size:12px;color:var(--text-secondary);margin-top:5px;">
                                If download doesn't start, check your popup blocker
                            </p>
                        </div>
                    `;
                    
                    btn.innerHTML = '<i class="fas fa-check"></i> Downloaded!';
                    btn.style.background = 'var(--gold)';
                    btn.style.color = 'var(--dark)';
                    
                    setTimeout(() => {
                        btn.innerHTML = '<i class="fas fa-music"></i> Download MP3';
                        btn.style.background = 'var(--primary)';
                        btn.style.color = '#fff';
                        btn.disabled = false;
                    }, 3000);
                } else {
                    throw new Error(data.message || 'Download failed');
                }
            } catch (err) {
                status.innerHTML = `
                    <div style="padding:15px;background:#ffe6e6;border-radius:10px;margin-top:10px;">
                        <p style="color:#e74c3c;font-size:14px;">
                            <i class="fas fa-exclamation-circle"></i> ${err.message || 'Download failed. Please try again.'}
                        </p>
                    </div>
                `;
                
                btn.innerHTML = '<i class="fas fa-redo"></i> Try Again';
                btn.style.background = '#e74c3c';
                
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-music"></i> Download MP3';
                    btn.style.background = 'var(--primary)';
                    btn.disabled = false;
                }, 2000);
            }
        }

        function showError(message) {
            document.getElementById("content").innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>Error</h2>
                    <p style="margin:10px 0;">${message}</p>
                    <a href="/" style="display:inline-block;padding:12px 30px;background:var(--primary);color:#fff;border-radius:50px;text-decoration:none;margin-top:10px;font-weight:600;">
                        <i class="fas fa-home"></i> Try Another Video
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>
