<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Galmee • HD Video Downloader</title>
  <!-- Font Awesome 6 for crisp icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary: #009959;
      --primary-soft: #e6f7ef;
      --yellow: #FEC601;
      --red: #e63946;
      --bg: #f4f6f9;
      --card-bg: #ffffff;
      --text-main: #1a2639;
      --text-soft: #5b6e8c;
      --border-light: #e9edf4;
      --shadow-card: 0 20px 35px rgba(0, 0, 0, 0.05), 0 8px 18px rgba(0, 0, 0, 0.03);
      --shadow-hover: 0 25px 40px rgba(0, 0, 0, 0.08), 0 10px 20px rgba(0, 153, 89, 0.08);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 30px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #f0f4f8 0%, #f8fafd 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    /* main container – soft glass effect */
    .app-wrapper {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* ---- HERO & INPUT (keep clean, slightly enhanced) ---- */
    .hero {
      text-align: center;
      padding: 20px 20px 10px;
    }

    .hero h1 {
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0b2b1f, #009959);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .hero p {
      color: #4a5c6c;
      font-weight: 500;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero p i {
      color: var(--primary);
      font-size: 1.2rem;
    }

    .input-box {
      max-width: 650px;
      margin: 25px auto 10px;
      display: flex;
      background: #fff;
      border-radius: 60px;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 153, 89, 0.1);
      transition: box-shadow 0.2s;
    }

    .input-box:focus-within {
      box-shadow: 0 15px 30px rgba(0, 153, 89, 0.12), 0 0 0 2px rgba(0, 153, 89, 0.2);
    }

    .input-box input {
      flex: 1;
      padding: 16px 22px;
      border: none;
      font-size: 1rem;
      background: transparent;
      outline: none;
      color: #1e293b;
      font-weight: 500;
    }

    .input-box input::placeholder {
      color: #8d9aaa;
      font-weight: 400;
    }

    .input-box button {
      background: var(--primary);
      border: none;
      color: white;
      padding: 0 28px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #009959, #00b36b);
      transition: all 0.25s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .input-box button:hover {
      background: linear-gradient(135deg, #007a47, #009959);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
    }

    .status {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
      color: #2c3e50;
      font-weight: 500;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 40px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid #dce5ec;
      border-top: 2.5px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ---- RESULT CARD – FULL STYLISH UPGRADE ---- */
    .result {
      display: none;
      margin-top: 10px;
      animation: fadeSlide 0.4s ease;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .video-row {
      display: flex;
      gap: 24px;
      background: var(--card-bg);
      padding: 24px;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(2px);
      transition: box-shadow 0.3s ease;
      border: 1px solid rgba(255,255,255,0.7);
      flex-wrap: wrap;
    }

    .video-row:hover {
      box-shadow: var(--shadow-hover);
    }

    /* LEFT VIDEO */
    .video-left {
      flex: 1 1 380px;
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
      box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    }

    video {
      width: 100%;
      height: auto;
      max-height: 300px;
      object-fit: cover;
      display: block;
      border-radius: var(--radius-lg);
      background: #0a0f14;
    }

    .watermark {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.6px;
      border: 1px solid rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    /* RIGHT SIDE – ENHANCED INFO */
    .video-right {
      flex: 1 1 380px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      justify-content: center;
    }

    /* Title + Badge row */
    .title-box {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
      background: #f8fafd;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      flex-wrap: wrap;
    }

    #title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0b1e2f;
      line-height: 1.3;
      word-break: break-word;
      margin: 0;
      flex: 1;
    }

    .badge {
      padding: 8px 18px;
      border-radius: 40px;
      color: white;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      background: #444;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }

    .facebook {
      background: #1877f2;
      background: linear-gradient(135deg, #1877f2, #0e5dc2);
    }
    .instagram {
      background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
    }

    /* info chips – more elegant */
    .info-box {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .chip {
      background: #f2f5fc;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 550;
      color: #1e2f40;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #eef2f8;
      transition: all 0.2s;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .chip i {
      color: var(--primary);
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .uploader-chip {
      background: #f0f7ff;
      border-color: #d4e2fc;
    }
    .views-chip {
      background: #f5faf7;
    }
    .size-chip {
      background: #fef9e7;
      border-color: #f9eec1;
    }

    /* Quality buttons – modern pills */
    .quality-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 6px 0 4px;
    }

    .q-btn {
      padding: 10px 18px;
      border-radius: 30px;
      border: 1px solid #dce3ed;
      background: #ffffff;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f9fbfd;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      letter-spacing: 0.2px;
    }

    .q-btn i {
      color: var(--primary);
      font-size: 0.8rem;
    }

    .q-btn:hover {
      background: var(--primary-soft);
      border-color: var(--primary);
      color: #00663a;
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(0,153,89,0.12);
    }

    /* Action buttons row */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px 10px;
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s;
      letter-spacing: 0.4px;
      background: white;
      border: 1px solid #e2e8f0;
      color: #1e293b;
    }

    .best {
      background: linear-gradient(135deg, #009959, #00b36b);
      border: none;
      color: white;
      box-shadow: 0 10px 18px rgba(0,153,89,0.3);
    }

    .best:hover {
      background: linear-gradient(135deg, #007a47, #009959);
      box-shadow: 0 12px 22px rgba(0,153,89,0.4);
      transform: scale(1.02);
    }

    .mp3 {
      background: linear-gradient(135deg, #FEC601, #ffd93d);
      border: none;
      color: #1e2b0c;
      box-shadow: 0 8px 16px rgba(254,198,1,0.3);
    }

    .mp3:hover {
      background: linear-gradient(135deg, #f5b700, #ffc800);
      transform: scale(1.02);
    }

    .reset {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      color: #4a5568;
    }

    .reset:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
      color: #e63946;
    }

    @media (max-width: 768px) {
      .video-row {
        flex-direction: column;
        padding: 18px;
      }
      .hero h1 {
        font-size: 2rem;
      }
      .btn {
        padding: 14px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <!-- Hero & Input -->
    <div class="hero">
      <h1>Download Videos Instantly</h1>
      <p>
        <i class="fab fa-facebook"></i> Facebook 
        <span style="margin:0 2px;">·</span> 
        <i class="fab fa-instagram"></i> Instagram HD
      </p>

      <div class="input-box">
        <input id="url" placeholder="Paste video link here..." autofocus>
        <button id="downloadBtn">
          <i class="fas fa-cloud-download-alt"></i> Download
        </button>
      </div>

      <div id="statusBox" class="status">
        <span class="spinner"></span>
        <span id="statusText">Processing...</span>
      </div>
    </div>

    <!-- Stylish Result Card -->
    <div class="result" id="result">
      <div class="video-row">
        <!-- Left: Video player -->
        <div class="video-left">
          <video id="player" controls playsinline preload="metadata"></video>
          <div class="watermark"><i class="fas fa-bolt" style="margin-right:4px;"></i>GALMEE</div>
        </div>

        <!-- Right: Upgraded info -->
        <div class="video-right">
          <div class="title-box">
            <h3 id="title">Video Title</h3>
            <span id="platformBadge" class="badge"></span>
          </div>

          <div class="info-box">
            <span id="uploaderName" class="chip uploader-chip">
              <i class="fas fa-user-circle"></i> @creator
            </span>
            <span id="viewCount" class="chip views-chip">
              <i class="fas fa-eye"></i> 0 views
            </span>
            <span id="fileSize" class="chip size-chip">
              <i class="fas fa-hdd"></i> 0 MB
            </span>
          </div>

          <div class="quality-grid" id="qualities">
            <!-- dynamic quality buttons injected here -->
          </div>

          <div class="actions">
            <button class="btn best" onclick="downloadBest()">
              <i class="fas fa-star"></i> Best
            </button>
            <button class="btn mp3" id="mp3Btn">
              <i class="fas fa-music"></i> MP3
            </button>
            <button class="btn reset" onclick="resetAll()">
              <i class="fas fa-redo-alt"></i> Reset
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const urlInput = document.getElementById('url');
      const dlBtn = document.getElementById('downloadBtn');
      const statusBox = document.getElementById('statusBox');
      const statusText = document.getElementById('statusText');
      const resultDiv = document.getElementById('result');
      const player = document.getElementById('player');
      const titleEl = document.getElementById('title');
      const uploaderEl = document.getElementById('uploaderName');
      const viewCountEl = document.getElementById('viewCount');
      const fileSizeEl = document.getElementById('fileSize');
      const platformBadge = document.getElementById('platformBadge');
      const qualitiesContainer = document.getElementById('qualities');

      // Helper: detect platform
      function detectPlatform(url) {
        if (!url) return '';
        const l = url.toLowerCase();
        if (l.includes('facebook.com') || l.includes('fb.watch') || l.includes('fb.com')) return 'facebook';
        if (l.includes('instagram.com')) return 'instagram';
        return '';
      }

      // Status visibility
      function showStatus(text) {
        statusBox.style.display = 'flex';
        statusText.innerText = text;
      }

      function hideStatus() {
        statusBox.style.display = 'none';
      }

      // Format views nicely
      function formatViews(views) {
        if (!views || isNaN(views)) return '0';
        if (views >= 1000000) return (views/1000000).toFixed(1) + 'M';
        if (views >= 1000) return (views/1000).toFixed(1) + 'K';
        return views.toString();
      }

      // Mock data generator (simulates backend response)
      function createMockData(url) {
        const platform = detectPlatform(url);
        const baseTitle = platform === 'facebook' ? 'Funny moment 😂 | Only smart people know' : 'Trending reel ✨';
        const uploader = platform === 'facebook' ? 'Jay Trần Tấn Phát' : 'instagram.creator';
        const views = platform === 'facebook' ? 1200000 : 845000;
        
        // Simulated formats (HD, SD, etc.)
        const formats = [
          { quality: 'HD 1080p', url: 'https://www.w3schools.com/html/mov_bbb.mp4' },
          { quality: 'HD 720p', url: 'https://www.w3schools.com/html/mov_bbb.mp4' },
          { quality: 'SD 480p', url: 'https://www.w3schools.com/html/mov_bbb.mp4' },
        ];
        
        return {
          title: baseTitle,
          uploader: uploader,
          views: views,
          size: '14.2 MB',
          formats: formats,
          platform: platform
        };
      }

      // Render video data into UI
      function renderVideoData(data) {
        // Set video source (first format)
        if (data.formats && data.formats.length > 0) {
          player.src = data.formats[0].url;
          player.load();
        }

        // Title
        titleEl.innerText = data.title || 'Untitled Video';
        
        // Uploader with icon preserved via innerHTML structure (chip already has icon)
        uploaderEl.innerHTML = `<i class="fas fa-user-circle"></i> ${data.uploader || '@unknown'}`;
        
        // Views
        const formattedViews = formatViews(data.views);
        viewCountEl.innerHTML = `<i class="fas fa-eye"></i> ${formattedViews} views`;
        
        // File size
        fileSizeEl.innerHTML = `<i class="fas fa-hdd"></i> ${data.size || 'Unknown'}`;

        // Platform badge
        const platform = data.platform || detectPlatform(urlInput.value);
        platformBadge.className = 'badge ' + (platform || 'facebook');
        platformBadge.innerText = platform ? platform.toUpperCase() : 'VIDEO';
        if (platform === 'instagram') {
          platformBadge.innerHTML = '<i class="fab fa-instagram" style="margin-right:4px;"></i> INSTAGRAM';
        } else if (platform === 'facebook') {
          platformBadge.innerHTML = '<i class="fab fa-facebook" style="margin-right:4px;"></i> FACEBOOK';
        }

        // Quality buttons
        qualitiesContainer.innerHTML = '';
        if (data.formats && Array.isArray(data.formats)) {
          data.formats.forEach(f => {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            btn.innerHTML = `<i class="fas fa-play-circle"></i> ${f.quality}`;
            btn.onclick = (e) => {
              e.preventDefault();
              window.open(f.url, '_blank');
            };
            qualitiesContainer.appendChild(btn);
          });
        }

        // Show result card
        resultDiv.style.display = 'block';
      }

      // Main fetch function (using mock, but structure ready for real endpoint)
      async function fetchVideo() {
        const url = urlInput.value.trim();
        if (!url) {
          alert('Please paste a Facebook or Instagram video URL.');
          return;
        }

        try {
          showStatus('Fetching video details...');
          
          // Simulate network delay
          await new Promise(resolve => setTimeout(resolve, 900));
          
          // In production, replace with real fetch:
          // const res = await fetch('/download', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
          // const data = await res.json();
          
          const data = createMockData(url);
          
          showStatus('Processing formats...');
          await new Promise(resolve => setTimeout(resolve, 400));
          
          renderVideoData(data);
          hideStatus();
        } catch (error) {
          hideStatus();
          alert('Failed to load video. Please try again.');
          console.error(error);
        }
      }

      // Download best quality (clicks first quality button)
      window.downloadBest = function() {
        const firstQBtn = document.querySelector('.q-btn');
        if (firstQBtn) {
          firstQBtn.click();
        } else {
          alert('No quality options available.');
        }
      };

      // Reset all fields
      window.resetAll = function() {
        urlInput.value = '';
        resultDiv.style.display = 'none';
        player.src = '';
        hideStatus();
        // Optional clear quality grid
        qualitiesContainer.innerHTML = '';
      };

      // MP3 button (simulated)
      document.getElementById('mp3Btn').addEventListener('click', function() {
        alert('MP3 extraction feature will be available soon. 🎵');
      });

      // Event listeners
      dlBtn.addEventListener('click', fetchVideo);

      // Auto paste detection
      urlInput.addEventListener('paste', () => {
        setTimeout(() => {
          if (urlInput.value.trim()) {
            fetchVideo();
          }
        }, 400);
      });

      // Optional: input detection for platform (visual only)
      urlInput.addEventListener('input', () => {
        // Could be used for live badge preview, but not necessary now
      });

      // Initial placeholder welcome (optional)
      // Pre-fill example URL for demonstration? Not needed.
    })();
  </script>
</body>
</html>
