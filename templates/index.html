    <style>
        :root {
            --primary: #009959;
            --primary-dark: #007a47;
            --primary-light: #e6f5ee;
            --gold: #FEC601;
            --gold-dark: #e6b300;
            --dark: #002611;
            --white: #FFFFFF;
            --text: #002611;
            --text-secondary: #4a6b56;
            --border: #d4e6da;
            --shadow: 0 2px 4px rgba(0,38,17,0.06);
            --shadow-md: 0 4px 16px rgba(0,38,17,0.1);
            --shadow-lg: 0 8px 32px rgba(0,38,17,0.15);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 18px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f5f8f6;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; font-family: inherit; }
        input { font-family: inherit; }
        img { max-width: 100%; height: auto; }
        
        /* Header */
        .header {
            background: var(--dark);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,38,17,0.3);
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 3px;
            text-decoration: none;
        }
        .logo-icon {
            width: 26px;
            height: 26px;
            border-radius: 8px;
        }
        .logo-text {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold) 0%, #ffe680 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-dot {
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
            font-size: 10px;
        }
        
        /* Main */
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }
        
        /* Hero Card */
        .hero-card {
            background: linear-gradient(135deg, var(--dark) 0%, #003d1b 50%, #001a0b 100%);
            border-radius: var(--radius-lg);
            padding: 36px 22px;
            text-align: center;
            color: #fff;
            margin-bottom: 24px;
            box-shadow: 0 12px 40px rgba(0,38,17,0.4);
            position: relative;
            overflow: hidden;
        }
        .hero-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0,153,89,0.08) 0%, transparent 50%), 
                        radial-gradient(circle at 70% 50%, rgba(254,198,1,0.05) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            pointer-events: none;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .hero-brand {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: 38px;
            font-weight: 900;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, var(--gold) 0%, #ffe680 40%, var(--primary) 60%, #00cc75 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-card h1 {
            font-size: 18px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }
        .hero-card .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-top: 6px;
            position: relative;
            z-index: 1;
        }
        
        /* Platform Badge */
        .platform-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .platform-badge .fa-facebook {
            color: #1877f2;
        }
        
        /* Search Box */
        .search-box {
            display: flex;
            background: #fff;
            border-radius: 50px;
            padding: 5px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(254,198,1,0.2), 0 8px 30px rgba(0,0,0,0.3);
        }
        .search-box input {
            flex: 1;
            border: none;
            padding: 14px 18px;
            outline: none;
            border-radius: 50px;
            font-size: 14px;
            background: transparent;
            color: var(--text);
            min-width: 0;
        }
        .search-box input::placeholder {
            color: #999;
        }
        .search-box img {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            margin: 2px;
        }
        .dl-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            font-size: 16px;
        }
        .dl-btn:hover {
            background: var(--gold);
            color: var(--dark);
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(254,198,1,0.4);
        }
        
        /* Result Area */
        .result-area {
            margin-top: 15px;
            position: relative;
            z-index: 1;
        }
        
        /* Video Info Card */
        .video-card {
            background: #fff;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .video-thumb {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            display: block;
        }
        .video-info {
            padding: 18px;
        }
        .video-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 6px;
        }
        .video-uploader {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .video-duration {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .video-duration i {
            color: var(--primary);
        }
        
        /* Download Section */
        .download-section {
            padding: 0 18px 18px 18px;
        }
        .download-heading {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .download-heading i {
            color: var(--primary);
        }
        .download-buttons {
            display: grid;
            gap: 8px;
        }
        .download-option {
            width: 100%;
            padding: 13px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .download-option:hover {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .download-option:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .download-option .quality {
            font-size: 12px;
            opacity: 0.9;
        }
        
        /* Loading */
        .loading-state {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.8);
        }
        .loading-state i {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        /* Error */
        .error-state {
            text-align: center;
            padding: 20px;
            background: #fff;
            border-radius: var(--radius);
            color: #e74c3c;
            font-size: 14px;
        }
        
        /* No formats */
        .no-formats {
            text-align: center;
            padding: 15px;
            background: #fff;
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        /* Footer */
        .footer {
            background: var(--dark);
            padding: 24px 16px;
            text-align: center;
            margin-top: 36px;
            color: rgba(255,255,255,0.7);
        }
        .footer-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin-bottom: 12px;
        }
        .footer-logo img {
            width: 24px;
            height: 24px;
            border-radius: 6px;
        }
        .footer-logo span {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: 22px;
            font-weight: 900;
            color: var(--gold);
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 14px;
        }
        .social-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s ease;
        }
        .social-icon:hover { transform: translateY(-2px); }
        .social-icon.fb:hover { background: #1877f2; color: #fff; border-color: #1877f2; }
        .social-icon.ig:hover { background: linear-gradient(135deg,#f09433,#dc2743,#bc1888); color: #fff; }
        .social-icon.telegram:hover { background: #0088cc; color: #fff; border-color: #0088cc; }
        .social-icon.whatsapp:hover { background: #25D366; color: #fff; border-color: #25D366; }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .footer-links a {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }
        .footer-links a:hover { color: var(--gold); }
        .copyright {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .copyright strong { color: var(--gold); }
        
        .form-note {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .hero-card { padding: 28px 12px; }
            .hero-brand { font-size: 28px; }
            .hero-card h1 { font-size: 15px; }
            .search-box input { padding: 10px 12px; font-size: 12px; }
            .search-box img { width: 34px; height: 34px; }
            .dl-btn { width: 34px; height: 34px; font-size: 14px; }
        }
    </style>
</head>
