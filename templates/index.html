<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galmee - YouTube MP3 & Video Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 48px;
            font-weight: 900;
            color: #ff0000;
            margin-bottom: 8px;
        }
        .tagline {
            color: #aaa;
            font-size: 18px;
        }
        form {
            background: #1f1f1f;
            padding: 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 24px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .preview {
            margin-top: 30px;
            min-height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">GALMEE</h1>
            <p class="tagline">YouTube MP3 & Video Downloader</p>
        </div>

        <form id="form">
            <input type="text" id="url" placeholder="Paste YouTube link here..." required>
            <button type="submit">Get Links</button>
        </form>

        <div id="preview" class="preview"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
