<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galmee - Facebook & Instagram Video Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --primary:#00a86b;
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#1e293b;
    --border:#e2e8f0;
}

[data-theme="dark"] {
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f1f5f9;
    --border:#334155;
}

body {
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:var(--card);
    position:sticky;
    top:0;
}

.logo {font-weight:bold;}

.theme-btn {
    border:none;
    background:var(--border);
    padding:8px;
    border-radius:50%;
}

/* HERO */
.hero {
    text-align:center;
    padding:40px 20px;
}

input {
    width:100%;
    padding:15px;
    border-radius:10px;
    border:2px solid var(--border);
}

.btn {
    width:100%;
    padding:15px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

/* RESULT */
.video-preview-card {
    margin-top:20px;
    background:var(--card);
    border-radius:10px;
    padding:15px;
}

video {
    width:100%;
    border-radius:10px;
}

.quality-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
}

.quality-btn {
    padding:12px;
    border:1px solid var(--border);
    border-radius:8px;
    cursor:pointer;
}

.action-buttons {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.mp3-btn,.best-btn {
    padding:12px;
    border:none;
    border-radius:8px;
    color:#fff;
}

.mp3-btn {background:#333;}
.best-btn {background:var(--primary);}

/* ADS */
.ad-section {
    margin:20px;
    padding:10px;
    text-align:center;
    border:1px dashed var(--border);
}

/* WHY */
.why-section {
    padding:30px;
    text-align:center;
}

.why-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.why-card {
    padding:20px;
    background:var(--card);
    border-radius:10px;
}

/* FAQ */
.faq {
    padding:30px;
}

.faq-item {
    margin-bottom:15px;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:20px;
    background:#111;
    color:#fff;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">Galmee</div>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</div>

<!-- HERO -->
<div class="hero">

    <h1>Download Facebook & Instagram Videos</h1>

    <input id="videoUrl" placeholder="Paste link here">
    <button class="btn" onclick="fetchVideo()">Download</button>

    <!-- RESULT -->
    <div id="result-area" style="display:none">

        <div class="video-preview-card">
            <video id="player" controls></video>

            <h3 id="v-title"></h3>

            <div id="quality-list" class="quality-grid"></div>

            <div class="action-buttons">
                <button class="best-btn" onclick="downloadBest()">Best</button>
                <button class="mp3-btn" onclick="downloadMP3()">MP3</button>
            </div>

        </div>

    </div>

</div>

<!-- ADS -->
<div class="ad-section">
    Advertisement Area
</div>

<!-- WHY -->
<section class="why-section">
    <h2>Why Choose Us</h2>

    <div class="why-grid">
        <div class="why-card">Fast Downloads</div>
        <div class="why-card">Secure</div>
        <div class="why-card">Mobile Friendly</div>
    </div>
</section>

<!-- FAQ -->
<section class="faq">
    <h2>FAQ</h2>

    <div class="faq-item">
        <b>Is it free?</b>
        <p>Yes, 100% free.</p>
    </div>

    <div class="faq-item">
        <b>Need login?</b>
        <p>No login required.</p>
    </div>
</section>

<!-- FOOTER -->
<div class="footer">
    © 2026 Galmee
</div>

<script>
function toggleTheme(){
    const current=document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', current==='dark'?'light':'dark');
}

/* FETCH VIDEO */
async function fetchVideo(){

    const url=document.getElementById('videoUrl').value;

    if(!url) return alert("Paste URL");

    const res=await fetch('/download',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({url})
    });

    const data=await res.json();

    document.getElementById('result-area').style.display='block';
    document.getElementById('player').src=data.formats[0].url;
    document.getElementById('v-title').innerText=data.title;

    const list=document.getElementById('quality-list');
    list.innerHTML='';

    data.formats.forEach(f=>{
        list.innerHTML+=`
            <button class="quality-btn" onclick="downloadVideo('${f.url}')">
                ${f.quality}
            </button>
        `;
    });
}

function downloadVideo(url){
    window.open(url,'_blank');
}

function downloadBest(){
    const first=document.querySelector('.quality-btn');
    if(first) first.click();
}

function downloadMP3(){
    alert("MP3 coming soon");
}
</script>

</body>
</html>
