<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmee - Premium Video Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

/* ===== ROOT ===== */
:root {
  --primary:#00c27a;
  --secondary:#111827;
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#0f172a;
}

[data-theme="dark"]{
  --bg:#020617;
  --card:#0f172a;
  --text:#e2e8f0;
}

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== NAV ===== */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

.logo{font-weight:800;font-size:20px;}

.nav-right{
  display:flex;
  gap:10px;
}

.btn-small{
  padding:8px 14px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#00c27a,#007cf0);
  color:#fff;
}

.hero h1{
  font-size:36px;
  margin-bottom:10px;
}

.hero p{
  opacity:0.9;
}

/* INPUT */
.input-box{
  max-width:600px;
  margin:30px auto;
  display:flex;
  background:#fff;
  border-radius:50px;
  overflow:hidden;
}

.input-box input{
  flex:1;
  padding:16px;
  border:none;
}

.input-box button{
  background:var(--primary);
  border:none;
  color:#fff;
  padding:0 25px;
  font-weight:bold;
}

/* ===== RESULT ===== */
.result{
  max-width:700px;
  margin:20px auto;
  display:none;
}

.card{
  background:var(--card);
  border-radius:15px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

video{
  width:100%;
  border-radius:10px;
}

.quality-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:15px;
}

.q-btn{
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
  cursor:pointer;
  background:#f9fafb;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.actions button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  color:#fff;
}

.best{background:var(--primary);}
.mp3{background:#333;}

/* ===== TRUST BAR ===== */
.trust{
  display:flex;
  justify-content:center;
  gap:30px;
  padding:20px;
  font-size:14px;
}

/* ===== FEATURES ===== */
.features{
  padding:60px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:30px;
}

.feature{
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

/* ===== CTA ===== */
.cta{
  text-align:center;
  padding:60px 20px;
  background:linear-gradient(135deg,#007cf0,#00dfd8);
  color:#fff;
}

.cta button{
  padding:15px 30px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

/* ===== FAQ ===== */
.faq{
  padding:40px 20px;
}

.faq-item{
  margin-bottom:15px;
}

/* ===== FOOTER ===== */
.footer{
  background:#000;
  color:#fff;
  text-align:center;
  padding:20px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">Galmee</div>
  <div class="nav-right">
    <button class="btn-small" onclick="toggleTheme()">🌙</button>
    <button class="btn-small">Login</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Download Videos Instantly</h1>
  <p>Facebook • Instagram • HD Quality • Fast & Free</p>

  <div class="input-box">
    <input id="url" placeholder="Paste video link...">
    <button onclick="fetchVideo()">Download</button>
  </div>
</div>

<!-- TRUST -->
<div class="trust">
  <span>⚡ Fast</span>
  <span>🔒 Secure</span>
  <span>📱 Mobile</span>
</div>

<!-- RESULT -->
<div class="result" id="result">
  <div class="card">
    <video id="player" controls></video>
    <h3 id="title"></h3>

    <div class="quality-grid" id="qualities"></div>

    <div class="actions">
      <button class="best" onclick="downloadBest()">Best</button>
      <button class="mp3">MP3</button>
    </div>
  </div>
</div>

<!-- FEATURES -->
<div class="features">
  <h2>Why Choose Galmee</h2>
  <div class="grid">
    <div class="feature">⚡ Ultra Fast</div>
    <div class="feature">🔐 Safe & Private</div>
    <div class="feature">📱 Mobile Friendly</div>
  </div>
</div>

<!-- CTA -->
<div class="cta">
  <h2>Start Downloading Now</h2>
  <button onclick="window.scrollTo(0,0)">Try Now</button>
</div>

<!-- FAQ -->
<div class="faq">
  <h2>FAQ</h2>
  <div class="faq-item">
    <b>Is it free?</b>
    <p>Yes, completely free.</p>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Galmee
</div>

<script>
function toggleTheme(){
  const t=document.body.getAttribute('data-theme');
  document.body.setAttribute('data-theme', t==='dark'?'light':'dark');
}

async function fetchVideo(){
  const url=document.getElementById('url').value;

  const res=await fetch('/download',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({url})
  });

  const data=await res.json();

  document.getElementById('result').style.display='block';
  document.getElementById('player').src=data.formats[0].url;
  document.getElementById('title').innerText=data.title;

  const q=document.getElementById('qualities');
  q.innerHTML='';

  data.formats.forEach(f=>{
    q.innerHTML+=`<button class="q-btn" onclick="window.open('${f.url}')">${f.quality}</button>`;
  });
}

function downloadBest(){
  const first=document.querySelector('.q-btn');
  if(first) first.click();
}
</script>

</body>
</html>
