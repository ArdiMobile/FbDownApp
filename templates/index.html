<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video Downloader</title>
    <!-- Using Google Fonts to match the clean style -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50; /* Deep blue/grey for the button */
            --bg-color: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #2c3e50;
            border-radius: 8px;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }

        .download-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .download-btn:hover {
            opacity: 0.9;
        }

        /* Video Player Frame */
        #preview-container {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: #f9f9f9;
        }

        video {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .final-download-link {
            display: inline-block;
            background: #27ae60;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
        }

        .android-banner {
            margin-top: 50px;
            border-top: 1px solid #eee;
            padding-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Facebook Video Downloader</h1>
        <p class="subtitle">Tool to save Facebook videos in high quality right on the browser</p>

        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Enter the Facebook video link here">
        </div>

        <button class="download-btn" onclick="downloadVideo()">Download</button>

        <!-- Dynamic Preview Section -->
        <div id="preview-container">
            <h3 id="video-title"></h3>
            <video id="video-player" controls>
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <br>
            <a id="direct-link" class="final-download-link" href="#" target="_blank" download>Save Video High Quality</a>
        </div>

        <div class="android-banner">
            <h3>Facebook Downloader for Android</h3>
            <p>Install FBDown app on Android now to download Facebook videos easier and faster.</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
