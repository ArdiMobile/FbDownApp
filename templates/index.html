<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmee Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
  --primary:#009959;
  --yellow:#FEC601;
  --red:#e63946;
}

/* BASIC */
body{
  margin:0;
  font-family:Arial;
  background:#f5f8f6;
}

/* INPUT */
.input-box{
  max-width:600px;
  margin:40px auto;
  display:flex;
  background:#fff;
  border-radius:50px;
  overflow:hidden;
}

.input-box input{
  flex:1;
  padding:16px;
  border:none;
}

.input-box button{
  background:var(--primary);
  border:none;
  color:#fff;
  padding:0 25px;
  font-weight:bold;
}

/* RESULT */
.result{
  max-width:1000px;
  margin:20px auto;
  display:none;
}

.video-row{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  background:#fff;
  padding:20px;
  border-radius:20px;
}

/* LEFT VIDEO */
.video-left{
  flex:1;
  position:relative;
}

video{
  width:100%;
  border-radius:12px;
}

.watermark{
  position:absolute;
  bottom:10px;
  right:10px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

/* RIGHT PANEL */
.video-right{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* BADGES */
.fb-badge{
  background:#1877f2;
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
}

.ig-badge{
  background:linear-gradient(45deg,#f09433,#dc2743);
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
}

/* QUALITY */
.quality-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.q-btn{
  padding:8px 14px;
  border-radius:20px;
  border:1px solid #ddd;
  cursor:pointer;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:10px;
}

.actions button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  color:#fff;
}

.best{background:var(--primary);}
.mp3{background:#333;}
.reset-btn{background:var(--red);}

/* SPINNER */
.spinner{
  width:18px;
  height:18px;
  border:2px solid white;
  border-top:2px solid transparent;
  border-radius:50%;
  display:inline-block;
  animation:spin 0.7s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- INPUT -->
<div class="input-box">
  <input id="url" placeholder="Paste video link...">
  <button id="downloadBtn" onclick="fetchVideo()">
    <i class="fas fa-download"></i> Download
  </button>
</div>

<!-- RESULT -->
<div class="result" id="result">
  <div class="video-row">

    <div class="video-left">
      <video id="player" controls playsinline preload="metadata"></video>
      <div class="watermark">GALMEE</div>
    </div>

    <div class="video-right">
      <div style="display:flex;justify-content:space-between;">
        <h3 id="title">Video Title</h3>
        <span id="platformBadge"></span>
      </div>

      <div>
        <span id="uploaderName">@creator</span> · 
        <span id="viewCount">0 views</span> · 
        <span id="fileSize">0 MB</span>
      </div>

      <div class="quality-grid" id="qualities"></div>

      <div class="actions">
        <button class="best" onclick="downloadBest()">Best</button>
        <button class="mp3">BUY NOW</button>
        <button class="reset-btn" onclick="resetAll()">Reset</button>
      </div>
    </div>

  </div>
</div>

<script>
// GLOBAL
const dlBtn = document.getElementById('downloadBtn');

// PLATFORM
function detectPlatform(url){
  const l = url.toLowerCase();
  if(l.includes('facebook') || l.includes('fb.watch')) return 'facebook';
  if(l.includes('instagram')) return 'instagram';
  return 'unknown';
}

// SPINNER
function startSpin(){
  dlBtn.disabled = true;
  dlBtn.innerHTML = `<span class="spinner"></span> Processing...`;
}

function stopSpin(){
  dlBtn.disabled = false;
  dlBtn.innerHTML = `<i class="fas fa-download"></i> Download`;
}

// FETCH
async function fetchVideo(){
  const startTime = Date.now();

  try{
    const url = document.getElementById('url').value.trim();
    if(!url) return alert('Enter URL');

    startSpin();

    const platform = detectPlatform(url);
    const badge = document.getElementById('platformBadge');

    if(platform !== 'unknown'){
      badge.className = platform === 'facebook' ? 'fb-badge' : 'ig-badge';
      badge.innerText = platform.toUpperCase();
    }

    const res = await fetch('/download',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });

    const data = await res.json();

    document.getElementById('result').style.display='block';

    const player = document.getElementById('player');
    player.src = data.formats[0].url;
    player.load();

    document.getElementById('title').innerText = data.title || 'Video';
    document.getElementById('viewCount').innerText = (data.views || 0) + ' views';
    document.getElementById('fileSize').innerText = data.size || 'Unknown';

    const q = document.getElementById('qualities');
    q.innerHTML='';

    data.formats.forEach(f=>{
      const btn = document.createElement('button');
      btn.className='q-btn';
      btn.innerText=f.quality;
      btn.onclick=()=>window.open(f.url);
      q.appendChild(btn);
    });

  }catch(e){
    alert('Error loading video');
  }finally{
    const delay = Math.max(400 - (Date.now() - startTime),0);
    setTimeout(stopSpin, delay);
  }
}

// BEST
function downloadBest(){
  const first = document.querySelector('.q-btn');
  if(first) first.click();
}

// RESET
function resetAll(){
  document.getElementById('url').value='';
  document.getElementById('result').style.display='none';
  document.getElementById('qualities').innerHTML='';
}
</script>

</body>
</html>
