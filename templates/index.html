<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galmee Downloader</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root{
  --primary:#009959;
  --yellow:#FEC601;
  --red:#e63946;
}

/* BASE */
body{
  margin:0;
  font-family:Arial;
  background:#f5f8f6;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px;
}

/* INPUT */
.input-box{
  max-width:600px;
  margin:20px auto;
  display:flex;
  background:#fff;
  border-radius:50px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.input-box input{
  flex:1;
  padding:16px;
  border:none;
}

.input-box button{
  background:var(--primary);
  border:none;
  color:#fff;
  padding:0 25px;
  font-weight:bold;
  cursor:pointer;
}

/* STATUS */
.status{
  display:none;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:10px;
  color:#555;
}

.spinner{
  width:16px;
  height:16px;
  border:2px solid #ccc;
  border-top:2px solid var(--primary);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

/* RESULT */
.result{
  max-width:1000px;
  margin:20px auto;
  display:none;
}

/* ROW */
.video-row{
  display:flex;
  gap:20px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* MOBILE */
@media(max-width:768px){
  .video-row{flex-direction:column;}
}

/* VIDEO */
.video-left{
  flex:1;
  position:relative;
}

video{
  width:100%;
  max-height:260px;
  object-fit:cover;
  border-radius:14px;
}

.watermark{
  position:absolute;
  bottom:8px;
  right:8px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

/* RIGHT */
.video-right{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* TITLE */
.title-box{
  display:flex;
  justify-content:space-between;
  background:#f9fafb;
  padding:10px;
  border-radius:12px;
  border:1px solid #eee;
}

/* BADGE */
.badge{
  padding:4px 10px;
  border-radius:20px;
  color:#fff;
  font-size:12px;
}

.facebook{background:#1877f2;}
.instagram{background:linear-gradient(45deg,#f09433,#dc2743);}

/* INFO */
.info-box{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.chip{
  background:#eef2f7;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  border:1px solid #ddd;
}

/* QUALITY */
.quality-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.q-btn{
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

.best{background:linear-gradient(135deg,#009959,#00c46a);color:#fff;}
.mp3{background:linear-gradient(135deg,#FEC601,#ffdd55);color:#000;}
.reset{background:linear-gradient(135deg,#e63946,#ff5c5c);color:#fff;}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Download Videos Instantly</h1>
  <p>Facebook & Instagram HD Downloader</p>

  <div class="input-box">
    <input id="url" placeholder="Paste video link...">
    <button id="downloadBtn">
      <i class="fas fa-download"></i> Download
    </button>
  </div>

  <!-- STATUS (spinner + text) -->
  <div id="statusBox" class="status">
    <span class="spinner"></span>
    <span id="statusText">Processing...</span>
  </div>
</div>

<!-- RESULT -->
<div class="result" id="result">
  <div class="video-row">

    <!-- LEFT -->
    <div class="video-left">
      <video id="player" controls playsinline preload="metadata"></video>
      <div class="watermark">GALMEE</div>
    </div>

    <!-- RIGHT -->
    <div class="video-right">

      <div class="title-box">
        <h3 id="title">Video Title</h3>
        <span id="platformBadge" class="badge"></span>
      </div>

      <div class="info-box">
        <span id="uploaderName" class="chip">@creator</span>
        <span id="viewCount" class="chip">0 views</span>
        <span id="fileSize" class="chip">0 MB</span>
      </div>

      <div class="quality-grid" id="qualities"></div>

      <div class="actions">
        <button class="btn best" onclick="downloadBest()">Best</button>
        <button class="btn mp3">MP3</button>
        <button class="btn reset" onclick="resetAll()">Reset</button>
      </div>

    </div>

  </div>
</div>

<script>
  const urlInput = document.getElementById('url');
const dlBtn = document.getElementById('downloadBtn');
const statusBox = document.getElementById('statusBox');
const statusText = document.getElementById('statusText');

// PLATFORM
function detectPlatform(url){
  const l = url.toLowerCase();
  if(l.includes('facebook') || l.includes('fb.watch')) return 'facebook';
  if(l.includes('instagram')) return 'instagram';
  return '';
}

// STATUS
function showStatus(text){
  statusBox.style.display = 'flex';
  statusText.innerText = text;
}

function hideStatus(){
  statusBox.style.display = 'none';
}

// FETCH
async function fetchVideo(){
  const url = urlInput.value.trim();
  if(!url) return alert('Enter URL');

  try{
    showStatus('Fetching video...');

    const res = await fetch('/download',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });

    showStatus('Processing formats...');

    const data = await res.json();

    document.getElementById('result').style.display = 'block';

    // VIDEO
    const player = document.getElementById('player');
    player.src = data.formats[0].url;
    player.load();

    // TEXT
    document.getElementById('title').innerText = data.title || 'Video';
    document.getElementById('uploaderName').innerText = data.uploader || '@unknown';
    document.getElementById('viewCount').innerText = (data.views || 0) + ' views';
    document.getElementById('fileSize').innerText = data.size || 'Unknown';

    // BADGE
    const badge = document.getElementById('platformBadge');
    const platform = detectPlatform(url);
    badge.className = 'badge ' + platform;
    badge.innerText = platform.toUpperCase();

    // QUALITY
    const q = document.getElementById('qualities');
    q.innerHTML = '';

    data.formats.forEach(f=>{
      const btn = document.createElement('button');
      btn.className = 'q-btn';
      btn.innerText = f.quality;
      btn.onclick = ()=>window.open(f.url);
      q.appendChild(btn);
    });

    hideStatus();

  }catch(e){
    hideStatus();
    alert('Failed to load video');
  }
}

// AUTO PASTE
urlInput.addEventListener('paste', ()=>{
  setTimeout(fetchVideo, 500);
});

// AUTO DETECT
urlInput.addEventListener('input', ()=>{
  const url = urlInput.value;
  if(detectPlatform(url)){
    // optional auto fetch
    // fetchVideo();
  }
});

// BUTTON
dlBtn.addEventListener('click', fetchVideo);

// BEST
function downloadBest(){
  const first = document.querySelector('.q-btn');
  if(first) first.click();
}

// RESET
function resetAll(){
  urlInput.value='';
  document.getElementById('result').style.display='none';
}
</script>
</body>
</html>
