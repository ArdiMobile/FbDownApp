<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video Downloader</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2c3e50;
            --success-green: #27ae60;
            --reset-grey: #95a5a6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            color: #333;
            display: flex;
            justify-content: center;
        }

        .hero-section {
            max-width: 550px; /* Minimized width */
            width: 100%;
            background: white;
            padding: 40px;
            margin-top: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { font-size: 1.8rem; margin-bottom: 8px; font-weight: 700; }
        .subtitle { color: #666; font-size: 0.95rem; margin-bottom: 30px; }

        /* Input Area */
        .input-box {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--primary-blue);
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        /* Button Styling */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }

        .btn-download { background-color: var(--primary-blue); color: white; }
        .btn-success { background-color: var(--success-green); color: white; margin-top: 10px; text-decoration: none; display: block; }
        .btn-reset { background-color: transparent; color: var(--reset-grey); border: 1px solid #ddd; margin-top: 15px; }

        /* Compact Preview Area */
        #preview-area {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        video {
            width: 100%;
            max-width: 320px; /* Minimized size */
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div id="input-container">
            <h1>Facebook Video Downloader</h1>
            <p class="subtitle">Tool to save Facebook videos in high quality right on the browser</p>
            
            <input type="text" id="videoUrl" class="input-box" placeholder="Enter the Facebook video link here">
            <button class="btn btn-download" id="mainBtn" onclick="processVideo()">Download</button>
        </div>

        <!-- Stylish Preview & Download Area -->
        <div id="preview-area">
            <video id="video-player" controls></video>
            <h4 id="video-title" style="margin: 15px 0 10px;"></h4>
            
            <a id="hd-download" class="btn btn-success" href="#" target="_blank" download>
                Download High Quality (MP4)
            </a>

            <button class="btn btn-reset" onclick="resetApp()">Download Another Video</button>
        </div>

        <div style="margin-top: 40px; font-size: 0.85rem; color: #888;">
            <p><strong>Facebook Downloader for Android</strong><br>
            Install FBDown app on Android now to download videos faster.</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
