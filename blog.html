<script>
    function toggleDrawer(){document.getElementById('drawer').classList.toggle('show');document.getElementById('drawerOverlay').classList.toggle('show');}

    const blogPosts=[
        {
            id:1,
            title:"How to Download Facebook & Instagram Videos",
            slug:"how-to-download-facebook-instagram-videos",
            excerpt:"Complete guide to download videos from Facebook and Instagram in HD quality. Step-by-step tutorial with Galmee.",

            date:"2026-06-15",author:"Yasin Gelma",views:14500,readTime:"6 min read",
            tags:["Tools","Comparison","2026","Review"],category:"Review"
        }
    ];

    function renderBlogPosts(){
        const c=document.getElementById('blogPostsContainer');
        const s=[...blogPosts].sort((a,b)=>new Date(b.date)-new Date(a.date));
        c.innerHTML=s.map(p=>`
            <article class="blog-card" onclick="location.href='blog/${p.slug}.html'">
                <img src="${p.thumbnail}" alt="${p.title}" class="blog-thumbnail" loading="lazy">
                <div class="blog-card-body">
                    <h2>${p.title}</h2>
                    <div class="blog-meta">
                        <span><i class="fas fa-calendar"></i> ${new Date(p.date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</span>
                        <span><i class="fas fa-user"></i> ${p.author}</span>
                        <span><i class="fas fa-eye"></i> ${p.views.toLocaleString()} views</span>
                        <span><i class="fas fa-clock"></i> ${p.readTime}</span>
                    </div>
                    <p class="blog-excerpt">${p.excerpt}</p>
                    <div class="blog-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                    <span class="read-more">Read More <i class="fas fa-arrow-right"></i></span>
                </div>
            </article>`).join('');
    }

    function renderRecentPosts(){
        const r=[...blogPosts].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);
        document.getElementById('recentPosts').innerHTML=r.map(p=>`
            <a href="blog/${p.slug}.html" class="related-post">
                <div class="related-thumb"><img src="${p.thumbnail}" alt="" loading="lazy"></div>
                <div class="related-info"><h4>${p.title}</h4><span>${p.views.toLocaleString()} views</span></div>
            </a>`).join('');
    }

    function renderCategories(){
        const cats=[...new Set(blogPosts.map(p=>p.category))];
        document.getElementById('categoriesList').innerHTML=cats.map(c=>`<span class="tag-item">${c}</span>`).join('');
    }

    renderBlogPosts();
    renderRecentPosts();
    renderCategories();
</script>
