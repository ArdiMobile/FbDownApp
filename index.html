<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --blue:#1877f2;
    --light:#f5f7fa;
}

/* RESET */
body{
    margin:0;
    font-family:Arial;
    background:var(--light);
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    background:#000;
    color:#fff;
}
.logo img{ height:22px; }

.menu-toggle{ font-size:20px; cursor:pointer; }

.menu{
    display:none;
    flex-direction:column;
    position:absolute;
    top:55px;
    right:10px;
    background:#fff;
    padding:10px;
    border-radius:8px;
}
.menu a{
    text-decoration:none;
    padding:8px;
    color:#333;
}
.menu.show{ display:flex; }

/* HERO */
.hero{
    background:linear-gradient(135deg,#1877f2,#2d6df6);
    color:#fff;
    text-align:center;
    padding:30px 15px;
}
.hero h1{ font-size:22px; }

/* SEARCH */
.search-area{
    display:flex;
    background:#fff;
    border-radius:30px;
    overflow:hidden;
    margin:15px auto;
    max-width:500px;
}
.search-area input{
    flex:1;
    padding:10px;
    border:none;
}
.btn-dl{
    background:var(--blue);
    color:#fff;
    border:none;
    width:50px;
}

/* TAB BAR */
.tab-bar{
    display:flex;
    background:#fff;
    border-bottom:1px solid #ddd;
    position:sticky;
    top:0;
}
.tab-link{
    flex:1;
    padding:12px;
    border:none;
    background:none;
    font-size:12px;
}
.tab-link.active{
    color:var(--blue);
    border-bottom:2px solid var(--blue);
}

/* CONTENT */
.tab-content{
    display:none;
    padding:15px;
}
.tab-content.active{
    display:block;
}

/* GRID */
.video-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}
.video-card{
    background:#fff;
    border-radius:8px;
    padding:10px;
    text-align:center;
}
.video-thumb{
    height:70px;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* STEPS */
.step-card{
    display:flex;
    align-items:center;
    background:#fff;
    margin-bottom:10px;
    padding:10px;
    border-radius:8px;
}
.step-num{
    background:var(--blue);
    color:#fff;
    width:25px;
    height:25px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
}

/* FAQ */
.faq-item{
    background:#fff;
    margin-bottom:10px;
    border-radius:8px;
}
.faq-header{
    padding:10px;
    cursor:pointer;
}
.faq-answer{
    display:none;
    padding:10px;
}
.faq-item.active .faq-answer{
    display:block;
}

/* APPS */
.apps-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}
.app-card{
    background:#fff;
    padding:10px;
    border-radius:8px;
    text-align:center;
}

/* FOOTER */
.app-footer{
    background:#000;
    color:#fff;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhIq-H1KojZc9YDQ8j6ll0MRXxJ_WXNrBnYwGV_ue1bBhUZL_-7Bhs-OyeyXkKvOFbtP5WhZ7VH8G1i4QM0l9UPzq83A_kj6Htbp9folKq0kwdueR6eUx-N6CHFF16J1YxkuIJF7yykaazHEQSsB2Earjk8_Go4dX7ujY6vKukiG6clWoq0zn2JrP4q_fo/w320-h50/20459.png">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <div class="menu" id="menu">
        <a onclick="openTab(event,'tab-home')">Home</a>
        <a onclick="openTab(event,'tab-how')">How</a>
        <a onclick="openTab(event,'tab-updates')">Updates</a>
        <a onclick="openTab(event,'tab-faq')">FAQ</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Facebook Video Downloader</h1>
    <p>Fast • Free • HD</p>

    <form class="search-area">
        <input placeholder="Paste Facebook link...">
        <button class="btn-dl"><i class="fas fa-download"></i></button>
    </form>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
    <button class="tab-link active" onclick="openTab(event,'tab-home')"><i class="fas fa-home"></i></button>
    <button class="tab-link" onclick="openTab(event,'tab-how')"><i class="fas fa-download"></i></button>
    <button class="tab-link" onclick="openTab(event,'tab-updates')"><i class="fas fa-bell"></i></button>
    <button class="tab-link" onclick="openTab(event,'tab-faq')"><i class="fas fa-question"></i></button>
    <button class="tab-link" onclick="openTab(event,'tab-apps')"><i class="fas fa-th"></i></button>
</div>

<!-- CONTENT -->
<div class="tab-content active" id="tab-home">
    <div class="video-grid">
        <div class="video-card"><div class="video-thumb"><i class="fas fa-play"></i></div>Video 1</div>
        <div class="video-card"><div class="video-thumb"><i class="fas fa-play"></i></div>Video 2</div>
        <div class="video-card"><div class="video-thumb"><i class="fas fa-play"></i></div>Video 3</div>
    </div>
</div>

<div class="tab-content" id="tab-how">
    <div class="step-card"><div class="step-num">1</div>Copy Link</div>
    <div class="step-card"><div class="step-num">2</div>Paste</div>
    <div class="step-card"><div class="step-num">3</div>Download</div>
</div>

<div class="tab-content" id="tab-updates">
    <div class="step-card">Server improved 🚀</div>
</div>

<div class="tab-content" id="tab-faq">
    <div class="faq-item" onclick="toggleFaq(this)">
        <div class="faq-header">Is safe?</div>
        <div class="faq-answer">Yes 100%</div>
    </div>
</div>

<div class="tab-content" id="tab-apps">
    <div class="apps-grid">
        <div class="app-card">IG</div>
        <div class="app-card">TT</div>
        <div class="app-card">YT</div>
    </div>
</div>

<!-- FOOTER -->
<div class="app-footer">© 2026</div>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("show");
}

function openTab(evt, id){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-link").forEach(t=>t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    if(evt) evt.currentTarget.classList.add("active");
}

function toggleFaq(el){
    el.classList.toggle("active");
}
</script>

</body>
</html>
